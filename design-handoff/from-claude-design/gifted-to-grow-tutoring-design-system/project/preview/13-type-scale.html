<!doctype html>
<html><head><meta charset="utf-8"><title>Type scale</title><link rel="stylesheet" href="_base.css">
<style>
  table { width: 100%; border-collapse: collapse; }
  td { padding: 8px 6px; border-bottom: 1px dashed var(--sage); vertical-align: baseline; }
  .sample { color: var(--plum); }
  .display { font-family: var(--font-display); font-weight: 900; }
  .heading { font-family: var(--font-display); font-weight: 900; }
  .h3 { font-family: var(--font-display); font-weight: 700; }
  .body { font-family: var(--font-body); }
  .tok { font-family: ui-monospace, monospace; font-size: 11px; color: var(--ink-soft); text-align: right; white-space: nowrap; padding-left: 16px; }
</style></head>
<body><div class="card-frame">
  <table>
    <tr><td><span class="sample display" style="font-size:56px; line-height:1;">Display</span></td><td class="tok">--fs-display · Sansita Swashed 900</td></tr>
    <tr><td><span class="sample heading" style="font-size:40px; line-height:1.1;">Heading 1</span></td><td class="tok">--fs-h1 · Sansita Swashed 900</td></tr>
    <tr><td><span class="sample heading" style="font-size:28px; line-height:1.15;">Heading 2</span></td><td class="tok">--fs-h2 · Sansita Swashed 900</td></tr>
    <tr><td><span class="sample h3" style="font-size:24px; color:var(--plum);">Heading 3</span></td><td class="tok">--fs-h3 · Sansita Swashed 700</td></tr>
    <tr><td><span class="body" style="font-size:20px; color:var(--ink-soft);">Lead body</span></td><td class="tok">--fs-lead · Nunito 400</td></tr>
    <tr><td><span class="body" style="font-size:17px; color:var(--ink);">Body</span></td><td class="tok">--fs-body · Nunito 400</td></tr>
    <tr><td><span class="body" style="font-size:15px; color:var(--ink-soft);">Small</span></td><td class="tok">--fs-small · Nunito 400</td></tr>
    <tr><td><span class="body" style="font-size:13px; font-weight:700; color:var(--plum); letter-spacing: 0.14em; text-transform: uppercase;">Eyebrow label</span></td><td class="tok">--fs-eyebrow · Nunito 700 uppercase</td></tr>
  </table>
</div></body></html>
