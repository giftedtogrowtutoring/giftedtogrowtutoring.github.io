<!doctype html>
<html><head><meta charset="utf-8"><title>Form inputs</title><link rel="stylesheet" href="_base.css">
<style>
  .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
  .label { font-family: var(--font-body); font-weight: 700; font-size: 14px; color: var(--plum); }
  .help  { font-family: var(--font-body); font-size: 12px; color: var(--ink-soft); }
  input, textarea, select {
    font-family: var(--font-body); font-size: 16px; color: var(--ink);
    background: var(--cream); border: 2px solid var(--plum); border-radius: 16px;
    padding: 12px 14px; outline: none; transition: box-shadow 220ms, border-color 220ms;
  }
  input:focus, textarea:focus, select:focus {
    border-color: var(--orange); box-shadow: 0 0 0 4px rgba(240,141,60,0.18);
  }
  textarea { min-height: 70px; resize: vertical; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
</style></head>
<body><div class="card-frame">
  <div class="row">
    <div class="field">
      <label class="label">Your name</label>
      <input value="Maria Cortez">
    </div>
    <div class="field">
      <label class="label">Child's grade</label>
      <select><option>Kindergarten</option><option selected>2nd grade</option><option>3rd grade</option></select>
    </div>
  </div>
  <div class="field">
    <label class="label">What's on your mind?</label>
    <textarea placeholder="A sentence or two is plenty.">She loved books last year. Now she avoids them. I'd love to talk.</textarea>
    <div class="help">Jennifer reads every note herself and replies the same day.</div>
  </div>
</div></body></html>
