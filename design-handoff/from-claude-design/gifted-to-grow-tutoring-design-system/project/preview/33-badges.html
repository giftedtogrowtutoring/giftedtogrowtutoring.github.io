<!doctype html>
<html><head><meta charset="utf-8"><title>Badges & chips</title><link rel="stylesheet" href="_base.css">
<style>
  .wrap { gap: 10px; align-items: center; }
  .badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 12px; border-radius: 999px;
    font-family: var(--font-body); font-weight: 700; font-size: 13px;
    border: 1.5px solid;
  }
  .b-step { background: var(--cream); color: var(--plum); border-color: var(--plum); }
  .b-cert { background: var(--lavender); color: var(--plum); border-color: var(--lavender-deep); }
  .b-faith { background: var(--green); color: var(--cream); border-color: var(--green-deep); }
  .b-new { background: var(--lemon); color: var(--plum); border-color: var(--lemon-deep); }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); display: inline-block; }
  .lbl { font-family: ui-monospace, monospace; font-size: 11px; color: var(--ink-soft); margin-top: 8px; }
</style></head>
<body><div class="card-frame">
  <div class="wrap">
    <span class="badge b-step"><span class="dot"></span>FL Step Up Provider</span>
    <span class="badge b-cert">Certified PreK–6</span>
    <span class="badge b-cert">Reading Endorsed</span>
    <span class="badge b-cert">ESOL Endorsed</span>
    <span class="badge b-faith">Faith-aligned</span>
    <span class="badge b-new">Most asked about</span>
  </div>
  <div class="lbl">Pill radius (999px) · 1.5px border · use for credentials, audience tags, and inline status</div>
</div></body></html>
