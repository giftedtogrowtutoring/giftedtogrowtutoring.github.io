<!doctype html>
<html><head><meta charset="utf-8"><title>Semantic tokens</title><link rel="stylesheet" href="_base.css">
<style>
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  td { padding: 8px 10px; border-bottom: 1px dashed var(--sage); vertical-align: middle; }
  .sw { width: 28px; height: 28px; border-radius: 8px; border: 1.5px solid var(--border-soft); box-shadow: var(--shadow-sm); }
  .tok { font-family: ui-monospace, monospace; color: var(--plum); font-weight: 700; }
  .use { color: var(--ink-soft); }
</style></head>
<body><div class="card-frame">
  <table>
    <tr><td><div class="sw" style="background:#FFF8EC"></div></td><td class="tok">--bg</td><td class="use">Page background (cream, never white)</td></tr>
    <tr><td><div class="sw" style="background:#FBEFD4"></div></td><td class="tok">--bg-sunken</td><td class="use">Card press / pressed state</td></tr>
    <tr><td><div class="sw" style="background:#E8DCFF"></div></td><td class="tok">--bg-soft</td><td class="use">Section banding (lavender)</td></tr>
    <tr><td><div class="sw" style="background:#1A0F33"></div></td><td class="tok">--fg</td><td class="use">Body text on cream</td></tr>
    <tr><td><div class="sw" style="background:#3F2E5C"></div></td><td class="tok">--fg-muted</td><td class="use">Muted body, captions</td></tr>
    <tr><td><div class="sw" style="background:#3D1E6D"></div></td><td class="tok">--primary</td><td class="use">Headlines, primary plum buttons</td></tr>
    <tr><td><div class="sw" style="background:#F9D548"></div></td><td class="tok">--accent</td><td class="use">Primary CTA fill</td></tr>
    <tr><td><div class="sw" style="background:#A8C49A"></div></td><td class="tok">--border</td><td class="use">Soft sage border</td></tr>
    <tr><td><div class="sw" style="background:#5B8C3E"></div></td><td class="tok">--success</td><td class="use">Confirmation, growth states</td></tr>
  </table>
</div></body></html>
