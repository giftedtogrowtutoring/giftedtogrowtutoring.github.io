<!doctype html>
<html><head><meta charset="utf-8"><title>Buttons</title><link rel="stylesheet" href="_base.css">
<style>
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    padding: 13px 24px; font-family: var(--font-body); font-weight: 700; font-size: 16px;
    border-radius: 16px; border: 2px solid transparent; cursor: pointer; line-height: 1;
    transition: all 220ms cubic-bezier(0.32,0.72,0.32,1); text-decoration: none;
  }
  .btn-primary { background: var(--lemon); color: var(--plum); box-shadow: var(--shadow); }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(249,213,72,0.45); background: var(--lemon-deep); }
  .btn-plum { background: var(--plum); color: var(--cream); }
  .btn-plum:hover { background: var(--plum-deep); transform: translateY(-2px); box-shadow: var(--shadow-lift); }
  .btn-ghost { background: transparent; color: var(--plum); border-color: var(--plum); }
  .btn-ghost:hover { background: var(--lavender); transform: translateY(-2px); }
  .btn-orange { background: var(--orange); color: var(--cream); }
  .btn-orange:hover { background: var(--orange-deep); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(240,141,60,0.40); }
  .lbl { font-family: ui-monospace, monospace; font-size: 11px; color: var(--ink-soft); margin-top: 6px; }
  .col { gap: 6px; align-items: flex-start; }
</style></head>
<body><div class="card-frame">
  <div class="wrap" style="gap:14px;">
    <div class="col"><button class="btn btn-primary">Send Jennifer a note</button><span class="lbl">.btn-primary · lemon CTA (default)</span></div>
    <div class="col"><button class="btn btn-plum">Read parents' stories</button><span class="lbl">.btn-plum · secondary</span></div>
    <div class="col"><button class="btn btn-ghost">Call (941) 586-8421</button><span class="lbl">.btn-ghost · tertiary outline</span></div>
    <div class="col"><button class="btn btn-orange">Homeschool path</button><span class="lbl">.btn-orange · path-tinted</span></div>
  </div>
</div></body></html>
