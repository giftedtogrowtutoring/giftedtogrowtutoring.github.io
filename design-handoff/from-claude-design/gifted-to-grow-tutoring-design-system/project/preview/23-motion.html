<!doctype html>
<html><head><meta charset="utf-8"><title>Motion — breathe + button lift</title><link rel="stylesheet" href="_base.css">
<style>
  .row { gap: 28px; align-items: center; padding: 12px 0 24px; }
  .demo { display:flex; flex-direction:column; align-items:center; gap: 10px; }
  .lbl { font-family: ui-monospace, monospace; font-size: 11px; color: var(--ink-soft); text-align: center; }
  .lbl b { display:block; color: var(--plum); font-family: var(--font-body); font-size: 13px; }
  @keyframes breathe { 0%,100%{transform:scale(1);} 50%{transform:scale(1.02);} }
  .breathe { animation: breathe 4s ease-in-out infinite; transform-origin: center; }
  .breathe-off { animation-delay: 1.2s; }
  @keyframes lift {
    0%,40%   { transform: translateY(0);    box-shadow: 0 4px 12px rgba(61,30,109,0.10); }
    50%,90%  { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(249,213,72,0.45); }
    100%     { transform: translateY(0);    box-shadow: 0 4px 12px rgba(61,30,109,0.10); }
  }
  .btn {
    background: var(--lemon); color: var(--plum); font-family: var(--font-body); font-weight: 700;
    border: none; padding: 12px 22px; border-radius: 16px; font-size: 15px;
    animation: lift 2.4s ease-in-out infinite;
  }
</style></head>
<body><div class="card-frame">
  <div class="row">
    <div class="demo">
      <img class="breathe" src="../assets/character-lemon.svg" width="90" height="105">
      <div class="lbl"><b>.breathe</b>scale 1.0 → 1.02 · 4s ease-in-out</div>
    </div>
    <div class="demo">
      <img class="breathe breathe-off" src="../assets/character-orange.svg" width="90" height="105">
      <div class="lbl"><b>.breathe--offset</b>same loop · 1.2s delay</div>
    </div>
    <div class="demo">
      <button class="btn">Send Jennifer a note</button>
      <div class="lbl"><b>Button hover</b>−2px Y · lemon glow · 220ms</div>
    </div>
  </div>
</div></body></html>
