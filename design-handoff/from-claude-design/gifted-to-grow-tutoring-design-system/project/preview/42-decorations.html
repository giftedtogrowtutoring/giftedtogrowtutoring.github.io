<!doctype html>
<html><head><meta charset="utf-8"><title>Decorations</title><link rel="stylesheet" href="_base.css">
<style>
  .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 14px; align-items: end; }
  .cell { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .cell img { max-width: 100%; height: auto; max-height: 80px; }
  .lbl { font-family: ui-monospace, monospace; font-size: 10px; color: var(--ink-soft); text-align: center; }
</style></head>
<body><div class="card-frame">
  <div class="grid">
    <div class="cell"><img src="../assets/deco-sprout.svg"><span class="lbl">sprout</span></div>
    <div class="cell"><img src="../assets/deco-leaf.svg"><span class="lbl">leaf</span></div>
    <div class="cell"><img src="../assets/deco-seed.svg"><span class="lbl">seed</span></div>
    <div class="cell"><img src="../assets/deco-sparkle.svg"><span class="lbl">sparkle</span></div>
    <div class="cell"><img src="../assets/deco-book.svg"><span class="lbl">book</span></div>
    <div class="cell"><img src="../assets/deco-heart.svg"><span class="lbl">heart</span></div>
    <div class="cell"><img src="../assets/deco-sun.svg"><span class="lbl">sun</span></div>
    <div class="cell"><img src="../assets/deco-apple.svg"><span class="lbl">apple</span></div>
    <div class="cell"><img src="../assets/deco-pencil.svg"><span class="lbl">pencil</span></div>
  </div>
</div></body></html>
