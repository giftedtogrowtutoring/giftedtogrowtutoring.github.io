<!doctype html>
<html><head><meta charset="utf-8"><title>Eyebrow + label</title><link rel="stylesheet" href="_base.css">
<style>
  .eyebrow { font-family: var(--font-body); font-weight:700; font-size:13px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--plum); }
  .stack { display: flex; flex-direction: column; gap: 6px; }
  .lbl { font-family: ui-monospace, monospace; font-size: 11px; color: var(--ink-soft); }
  .group { display: flex; flex-direction: column; gap: 18px; }
  .h2 { font-family: var(--font-display); font-weight: 700; color: var(--plum); font-size: 32px; line-height: 1.1; }
</style></head>
<body><div class="card-frame">
  <div class="group">
    <div class="stack">
      <div class="eyebrow">Plant the Seed</div>
      <div class="h2">A patient first step</div>
      <div class="lbl">Eyebrow above headline — primary use</div>
    </div>
    <div class="stack">
      <div class="eyebrow" style="color: var(--green);">Faith-aligned families</div>
      <div class="lbl">Eyebrow tinted by audience-path color</div>
    </div>
  </div>
</div></body></html>
