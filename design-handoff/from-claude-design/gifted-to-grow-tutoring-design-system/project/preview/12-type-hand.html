<!doctype html>
<html><head><meta charset="utf-8"><title>Handwritten — Caveat</title><link rel="stylesheet" href="_base.css">
<style>
  .h { font-family: var(--font-hand); font-weight: 500; color: var(--plum); line-height: 1.1; }
  .lbl { font-family: ui-monospace, monospace; font-size: 11px; color: var(--ink-soft); }
  .row { gap: 18px; }
  .ex { display: flex; flex-direction: column; gap: 6px; }
</style></head>
<body><div class="card-frame">
  <div class="ex">
    <div class="h" style="font-size: 36px;">"I'll write back the same day, promise."</div>
    <div class="lbl">Caveat 500 · 36px · plum · max 2–3 instances per page</div>
  </div>
  <div class="ex" style="margin-top: 18px;">
    <div class="h" style="font-size: 24px; color: var(--green);">— Jennifer</div>
    <div class="lbl">Caveat 500 · 24px · green · used as quote signature</div>
  </div>
</div></body></html>
